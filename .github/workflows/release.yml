name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag. Defaults to v{src-tauri version}.
        required: false
        default: ""
      draft:
        description: Create the release as a draft
        required: true
        type: boolean
        default: true
      prerelease:
        description: Mark the release as a prerelease
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      draft: ${{ steps.release.outputs.draft }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version and tag
        id: release
        shell: bash
        run: |
          version="$(node -e "console.log(JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version)")"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
            draft="false"
            prerelease="false"
          else
            tag="${{ inputs.release_tag }}"
            if [ -z "$tag" ]; then
              tag="v${version}"
            fi
            draft="${{ inputs.draft }}"
            prerelease="${{ inputs.prerelease }}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Fail if release already exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          set +e
          output="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" 2>&1)"
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "::error::GitHub Release '$RELEASE_TAG' already exists. Bump src-tauri/tauri.conf.json version or choose a new release_tag before deploying."
            exit 1
          fi

          if ! grep -qiE "not found|HTTP 404|release not found" <<< "$output"; then
            echo "::error::Could not verify whether GitHub Release '$RELEASE_TAG' already exists."
            echo "$output"
            exit 1
          fi

  desktop:
    name: ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            build_command: npm run tauri-build
            stage_command: npm run release:stage -- windows
            rust_target: ""
            artifact: release-windows-x64
          - label: Linux x64
            os: ubuntu-22.04
            build_command: npm run tauri-build
            stage_command: npm run release:stage -- linux
            rust_target: ""
            artifact: release-linux-x64
          - label: macOS Apple Silicon
            os: macos-14
            build_command: npx tauri build --target aarch64-apple-darwin
            stage_command: npm run release:stage -- macos aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            artifact: release-macos-aarch64
          - label: macOS Intel
            os: macos-15-intel
            build_command: npx tauri build --target x86_64-apple-darwin
            stage_command: npm run release:stage -- macos x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            artifact: release-macos-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate updater signing secret
        shell: bash
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required because src-tauri/tauri.conf.json enables bundle.createUpdaterArtifacts."
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.artifact }}
          cache-on-failure: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Import Apple Developer certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_SECRET: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_CERTIFICATE}" ] && [ -z "${APPLE_CERTIFICATE_PASSWORD}" ]; then
            echo "::warning::APPLE_CERTIFICATE is not configured. Building unsigned macOS artifacts."
            echo "MACOS_SIGNING_MODE=unsigned" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "${APPLE_CERTIFICATE}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD}" ]; then
            echo "::error::APPLE_CERTIFICATE and APPLE_CERTIFICATE_PASSWORD must either both be set or both be omitted for unsigned macOS builds."
            exit 1
          fi

          certificate_path="$RUNNER_TEMP/apple-certificate.p12"
          keychain_path="$RUNNER_TEMP/clouddash-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"

          if ! printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path" 2>/dev/null; then
            printf '%s' "$APPLE_CERTIFICATE" | base64 -D > "$certificate_path"
          fi

          if ! openssl pkcs12 -in "$certificate_path" -nokeys -passin "pass:${APPLE_CERTIFICATE_PASSWORD}" >/dev/null 2>&1; then
            echo "::error::APPLE_CERTIFICATE must be the base64 contents of an exported .p12, and APPLE_CERTIFICATE_PASSWORD must match that .p12 export password."
            exit 1
          fi

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$APPLE_CERTIFICATE_PASSWORD" -f pkcs12 -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -d user -s "$keychain_path"

          identities="$(security find-identity -v -p codesigning "$keychain_path")"
          echo "$identities"

          signing_identity="${APPLE_SIGNING_IDENTITY_SECRET:-}"
          if [ -z "$signing_identity" ]; then
            signing_identity="$(printf '%s\n' "$identities" | awk -F'"' '/Developer ID Application/ { print $2; exit }')"
          fi
          if [ -z "$signing_identity" ]; then
            signing_identity="$(printf '%s\n' "$identities" | awk -F'"' '/Apple Distribution/ { print $2; exit }')"
          fi
          if [ -z "$signing_identity" ]; then
            signing_identity="$(printf '%s\n' "$identities" | awk -F'"' '/Apple Development/ { print $2; exit }')"
          fi
          if [ -z "$signing_identity" ]; then
            echo "::error::No valid Apple code signing identity was found in APPLE_CERTIFICATE."
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$signing_identity" >> "$GITHUB_ENV"
          echo "APPLE_KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"
          echo "MACOS_SIGNING_MODE=signed" >> "$GITHUB_ENV"

          if [ -n "${APPLE_ID_SECRET}" ] && [ -n "${APPLE_PASSWORD_SECRET}" ] && [ -n "${APPLE_TEAM_ID_SECRET}" ]; then
            echo "APPLE_ID=${APPLE_ID_SECRET}" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=${APPLE_PASSWORD_SECRET}" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=${APPLE_TEAM_ID_SECRET}" >> "$GITHUB_ENV"
          else
            echo "::warning::Apple notarization secrets are incomplete. macOS artifacts will be signed but not notarized."
          fi

      - name: Build
        run: ${{ matrix.build_command }}

      - name: Report unsigned macOS build
        if: runner.os == 'macOS' && env.MACOS_SIGNING_MODE == 'unsigned'
        run: |
          echo "::warning::This macOS artifact is unsigned. Users will need to right-click Open or approve it in System Settings > Privacy & Security."

      - name: Delete Apple signing keychain
        if: always() && runner.os == 'macOS'
        shell: bash
        run: |
          if [ -n "${APPLE_KEYCHAIN_PATH:-}" ] && [ -f "$APPLE_KEYCHAIN_PATH" ]; then
            security delete-keychain "$APPLE_KEYCHAIN_PATH"
          fi

      - name: Stage release assets
        run: ${{ matrix.stage_command }}

      - name: Upload staged assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release-dist
          if-no-files-found: error

  android:
    name: Android APK and AAB
    needs: prepare
    runs-on: ubuntu-22.04
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate updater signing secret
        shell: bash
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required because src-tauri/tauri.conf.json enables bundle.createUpdaterArtifacts."
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: android
          cache-on-failure: true

      - name: Configure Android signing
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          echo "${{ secrets.ANDROID_KEY_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/clouddash-upload.jks"
          echo "storeFile=$RUNNER_TEMP/clouddash-upload.jks" >> keystore.properties

      - name: Install dependencies
        run: npm ci

      - name: Build Android artifacts
        run: npm run tauri-android-build

      - name: Stage Android assets
        run: npm run release:stage -- android

      - name: Upload staged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: release-dist
          if-no-files-found: error

  publish:
    name: Create GitHub Release
    needs:
      - prepare
      - desktop
      - android
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_DRAFT: ${{ needs.prepare.outputs.draft }}
      RELEASE_PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download staged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          CloudDash ${RELEASE_VERSION}

          Official builds for Windows, Linux, macOS, and Android.
          macOS builds are unsigned unless Apple Developer signing secrets are configured.
          EOF

      - name: Create release
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::GitHub Release '$RELEASE_TAG' already exists. Refusing to overwrite release assets."
            exit 1
          fi

          args=(release create "$RELEASE_TAG" release-assets/* --title "CloudDash ${RELEASE_VERSION}" --notes-file release-notes.md --target "$GITHUB_SHA")
          if [ "$RELEASE_DRAFT" = "true" ]; then
            args+=(--draft)
          fi
          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"
