<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="%sveltekit.assets%/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
  <link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="CloudDash" />
  <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
  <title>CloudDash - AWS Console Made Simple</title>
  <meta name="description"
    content="Access AWS console seamlessly from Windows and Android. Pro version available for $36/year." />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <!-- Custom Modern CSS -->
  <link rel="stylesheet" href="%sveltekit.assets%/modern.css" />

  %sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover" style="background-color: #030712; color: #f9fafb;">
  <div style="display: contents">%sveltekit.body%</div>
</body>

</html>
